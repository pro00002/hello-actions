# Medium workflow: Runs on push/PR, checks out code, sets up Python, installs, lints, tests, runs app
name: Python CI Example

on:
  push:
    branches:
      - main
      - "feature/*"        # Runs only on main and feature branches
  pull_request:

jobs:
  python-ci:
    name: Python Build, Lint, Test, Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r python-app/requirements.txt

      - name: Lint (syntax check)
        run: python -m py_compile python-app/hello.py

      - name: Run unit tests
        run: python -m unittest discover python-app

      - name: Run Application
        run: python python-app/hello.py